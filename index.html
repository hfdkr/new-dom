<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #div_content {
            display: flex;
            justify-content: space-around;
            background-color: aquamarine;
            width: 800px;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;

        }

        #button {
            width: 40px;
            height: 40px;
            background-color: blanchedalmond;
        }

        #button:active {
            background-color: black;
        }

        .btn,
        .btn_1,
        #btn_2,
        #ssend {
            width: 40px;
            height: 40px;
        }

        .btn_1 {
            background-color: red;
        }

        .div-btn {
            background-color: chartreuse;
            padding: 10px 20px;
            margin-top: 20px;
            align-items: center;
        }

        #list {
            color: black;
        }

        .div {
            background-color: black;
            color: white;
            padding: 20px;
            margin: 20px 0px
        }

        .form {
            background-color: brown;
            padding: 20px;
        }

        .div-input {
            display: flex;
            justify-content: space-evenly;
        }

        #textInput {
            padding: 10px;
            border-radius: 20px;
            border: 3px solid black;
        }
    </style>
</head>

<body>
    <!-- ex 1 and ex 2 -->
    <div id="div_content">
        <h1 id="header_1">HELLO WORLD</h1>
        <button id="button" class=""></button>
    </div>
    <!-- ex 3 and ex 4 -->
    <div class="div-btn">
        <ul id="list"></ul>
        <button class="btn"></button>
        <button class="btn_1"></button>
    </div>
    <!-- ex 5 -->
    <div class="div">
        <button id="btn_2"></button>
    </div>
    <!-- ex 6 -->
    <div class="form">
        <div class="div-input">
            <form id="myForm">
                <input type="text" id="textInput" placeholder="enter a text">
            </form>
            <button id="ssend"></button>
        </div>
        <p id="result"></p>
    </div>
    <!-- ex 8 -->
    <div>
        <button id="minus">-</button>
        <span id="counter">0</span>
        <button id="plus">+</button>
    </div>
    <script>
        let header = document.getElementById("header_1");
        header.textContent = "Hello everyone";
        let button = document.getElementById("button");
        button.addEventListener('click', () => {
            header.style.color = "#FF6636";
        });
        button.addEventListener('mouseleave', () => {
            header.style.color = "";
        })
        let btn = document.getElementsByClassName("btn")
        btn[0].addEventListener("click", () => {
            let li = document.createElement("li")
            li.textContent = "New item";
            document.getElementById("list").appendChild(li);
        });
        let btn_1 = document.getElementsByClassName("btn_1");
        btn_1[0].addEventListener("click", () => {
            let list = document.getElementById("list");
            if (list.lastElementChild) {
                list.lastElementChild.remove()
                    ;
            }
        })
        let btn_2 = document.getElementById("btn_2")
        btn_2.addEventListener('click', () => {
            alert("Hello DOM");
        });
        let ssend = document.getElementById("ssend")
        ssend.addEventListener("click", () => {
            let textInput = document.getElementById("textInput")
            let result = document.getElementById("result");
            result.textContent = textInput.value;
        });

        let count = 0;

        let plus = document.getElementById("plus");
        let minus = document.getElementById("minus");
        let display = document.getElementById("counter");

        plus.addEventListener("click", () => {
            count++;
            display.textContent = count;
        });

        minus.addEventListener("click", () => {
            count--;
            display.textContent = count;
        });
        minus.addEventListener("click", () => {
            if (count > 0) {
                count--;
                display.textContent = count;
            }
        });

    </script>
</body>

</html>
